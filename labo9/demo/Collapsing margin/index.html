<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Collapsing margin</title>
  <style>
    /* Box Styles */
    .box {
      width: 200px;
      padding: 20px;
      color: white;
      text-align: center;
      border: 2px solid #ddd;
      background-color: #3498db;

    }

    /* Distinct Background Colors */
    .box1 {
      background-color: #3498db; /* Blue */
      margin: 20px 20px 20px 20px; /*Top, right, bottom, left*/
    }

    .box2 {
      background-color: #2ecc71; /* Green */
      margin: 30px 10px 20px; /*Top, left/right, bottom*/
    }

    .box3 {
      background-color: #e74c3c; /* Red */
      margin: 30px 10px; /*Top/bottom, left/right*/
    }

  </style>
</head>
<body>
<h1>Collapsing Margins Demo</h1>
<span class="box box1">First Box</span> <!--Inline kan geen width en height gebruiken-->
<span class="box box2">Second Box</span><!--Inline kan geen margin top en margin bottom gebruiken-->
<span class="box box3">Third Box</span>
<div class="box box1">First Box</div>
<div class="box box2">Second Box</div>
<div class="box box3">Third Box</div>
</body>
</html>
