<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Tabel</title>
</head>
<body>
<table border="1">
    <caption>Dit is een voorbeeld van een tabel</caption>
    <thead>
    <tr>  <!-- table row -->
        <th>kolom 1</th>
        <th>kolom 2</th>
        <th>kolom 3</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td colspan="3">1 en 2 en 3</td>
    </tr>
    <tr>
        <td rowspan="2">4 en 7</td>
        <td>5</td>
        <td rowspan="2">6 en 9</td>
    </tr>
    <tr>
        <td>8</td>
    </tr>
    </tbody>
</table>

</body>
</html>
