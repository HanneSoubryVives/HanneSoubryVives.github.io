<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>demo 2</title>

      /*float: left; /*alternatief voor clear: float + 100% width
      width: 100%;*/

      height: 120px;
    }
  </style>
</head>
<body>

<article id="box2">box 2</article>
